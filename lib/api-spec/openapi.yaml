                items: { $ref: '#/components/schemas/Organisation' }
    post:
      tags: [Organisations]
      operationId: createOrganisation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganisationInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organisation' }

  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      responses:
        '200':
