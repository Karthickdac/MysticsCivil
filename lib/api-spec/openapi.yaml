components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema: { type: string }
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema: { type: string }
    ProjectIdParam:
      name: projectId
      in: path
      required: true
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
